AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  Mecânica API — Lambda CPF→JWT (Fase 3 FIAP TC).
  Recebe POST com CPF, consulta cliente no RDS PostgreSQL provisionado por
  fiap-tc-mecanica-infra-db, valida ativo, emite JWT HS256 com mesma secret
  do app Spring Boot (validação transparente pelo JwtAuthenticationFilter).

Parameters:
  Environment:
    Type: String
    Default: develop
    AllowedValues: [develop, lab, prod]
  DbHost:
    Type: String
    Description: Endpoint do RDS (output rds_endpoint de fiap-tc-mecanica-infra-db)
  DbPort:
    Type: Number
    Default: 5432
  DbName:
    Type: String
    Default: mecanica
  DbUsername:
    Type: String
    Default: mecanica_user
  DbPassword:
    Type: String
    NoEcho: true
    Description: Senha do master RDS (terraform output rds_master_password)
  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Description: SG IDs com acesso ao RDS (mesma VPC do RDS)
  VpcSubnetIds:
    Type: CommaDelimitedList
    Description: Subnets privadas onde a Lambda roda (mesma VPC do RDS)
  JwtSecret:
    Type: String
    NoEcho: true
    Description: MESMA secret HS256 usada pelo app Spring Boot (k8s Secret SECURITY_JWT_SECRET_KEY)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures: [arm64]
    Environment:
      Variables:
        NODE_OPTIONS: "--enable-source-maps"

Resources:
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub mecanica-auth-${Environment}
      Description: CPF → JWT (HS256)
      CodeUri: ./dist
      Handler: handler.handler
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USERNAME: !Ref DbUsername
          DB_PASSWORD: !Ref DbPassword
          DB_SSL: "true"
          SECURITY_JWT_SECRET_KEY: !Ref JwtSecret
          ACCESS_TOKEN_TTL_SECONDS: "3600"
      VpcConfig:
        SecurityGroupIds: !Ref VpcSecurityGroupIds
        SubnetIds: !Ref VpcSubnetIds
      Events:
        AuthApi:
          Type: Api
          Properties:
            Path: /auth
            Method: POST

Outputs:
  AuthApiUrl:
    Description: URL pública do endpoint /auth (API Gateway gerenciado pelo SAM)
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/auth"
  AuthFunctionArn:
    Description: ARN da função Lambda
    Value: !GetAtt AuthFunction.Arn
