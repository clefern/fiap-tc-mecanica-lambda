name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        default: "lab"
      aws_region:
        required: true
        type: string
        default: "us-east-1"
      remote_state_infra_key:
        description: 'Chave do estado remoto para a infraestrutura no bucket (p.ex: lab/{key}/terraform.tfstate)'
        required: true
        type: string
        default: "infra"
      remote_state_db_key:
        description: 'Chave do estado remoto para o database no bucket (p.ex: lab/{key}/terraform.tfstate)'
        required: true
        type: string
        default: "db"

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente (lab, prod, etc)'
        required: true
        type: string
        default: "lab"
      aws_region:
        description: 'AWS Region'
        required: true
        type: string
        default: "us-east-1"
      remote_state_infra_key:
        description: 'Chave do estado remoto para a infraestrutura no bucket (p.ex: lab/{key}/terraform.tfstate)'
        required: true
        type: string
        default: "infra"
      remote_state_db_key:
        description: 'Chave do estado remoto para o database no bucket (p.ex: lab/{key}/terraform.tfstate)'
        required: true
        type: string
        default: "db"

jobs:
  deploy:
    name: λ Auth Lambda - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      DOMAIN: ${{ vars.PIPELINE_DOMAIN }}
      NAMESPACE: "mecanica-${{ inputs.environment }}"
      ROOT_DIR: ${{ github.workspace }}
      AWS_REGION: ${{ inputs.aws_region }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      BUCKET_NAME: ${{ vars.AWS_TERRAFORM_BUCKET_STATE }}
      BUCKET_STATE_INFRA_KEY: ${{ inputs.remote_state_infra_key }}
      BUCKET_STATE_DB_KEY: ${{ inputs.remote_state_db_key }}

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: .

      - name: 🚀 Run Deploy Script
        working-directory: infra/environments/${{ inputs.environment }}
        run: |
          chmod +x "${ROOT_DIR}/scripts/deploy.sh"
          ${ROOT_DIR}/scripts/deploy.sh
